<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bangor Water Level</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
 --bg:#f5f5f5;
 --card:white;
 --text:#111;
}

@media (prefers-color-scheme: dark){
 :root{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f0f0f0;
 }
}

body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 max-width:1100px;
 margin:0 auto;
 padding:20px;
 background:var(--bg);
 color:var(--text);
}

.card{
 background:var(--card);
 border-radius:12px;
 padding:20px;
 margin-bottom:20px;
 box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
 text-align:center;
}

.level{
 font-size:3.5rem;
 font-weight:bold;
}

.sparkline{
 font-size:1.2rem;
 margin-top:5px;
 letter-spacing:1px;
}

.trend{
 font-size:1.4rem;
 font-weight:bold;
 margin-top:10px;
}

.green{color:#0a9f3d;}
.red{color:#d62828;}
.orange{color:#f77f00;}
.grey{color:#777;}

.stats{
 display:flex;
 flex-wrap:wrap;
 gap:20px;
}

.stat{
 flex:1;
 min-width:140px;
}

button{
 padding:10px 14px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 margin:3px;
}

.active{
 font-weight:bold;
}

input{
 padding:8px;
 width:120px;
}

canvas{
 max-height:500px;
}

.footer{
 text-align:center;
 font-size:.9rem;
}

a{
 text-decoration:none;
}

</style>
</head>

<body>

<h1>Bangor Water Level</h1>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">

<div>

<div id="currentLevel" class="level">
Loading...
</div>

<div id="sparkline" class="sparkline"></div>

<div id="trend" class="trend"></div>

</div>

<div>
<button onclick="loadData()">🔄 Refresh</button>
</div>

</div>

<p><strong>Latest Observation:</strong> <span id="updated"></span></p>

<p>
<strong>Data Age:</strong>
<span id="dataAge"></span>
</p>

<p>
<strong>Dashboard Sync:</strong>
<span id="syncTime"></span>
</p>

<p id="forecastBox"></p>

</div>

<div class="card">

<label><strong>Datum Offset (m):</strong></label>
<input id="offset" type="number" step="0.001" value="0">

</div>

<div class="card stats">

<div class="stat">
<strong>24h High</strong><br>
<span id="high24">--</span>
</div>

<div class="stat">
<strong>24h Low</strong><br>
<span id="low24">--</span>
</div>

<div class="stat">
<strong>24h Range</strong><br>
<span id="range24">--</span>
</div>

<div class="stat">
<strong>24h Change</strong><br>
<span id="change24">--</span>
</div>

</div>

<div class="card">

<button onclick="setRange('6h')" id="btn6">6h</button>
<button onclick="setRange('12h')" id="btn12">12h</button>
<button onclick="setRange('24h')" id="btn24">24h</button>
<button onclick="setRange('7d')" id="btn7">7d</button>
<button onclick="setRange('3m')" id="btn3">3m</button>

<br><br>

<canvas id="chart"></canvas>

</div>

<div class="card footer">

<p>
<a href="https://epawebapp.epa.ie/hydronet/?_gl=#33008" target="_blank">
EPA Bangor Station
</a>
</p>

<p>
<a href="https://epawebapp.epa.ie/Hydronet/output/internet/stations/CAS/33008/Q/3_months.zip" target="_blank">
Source Data ZIP
</a>
</p>

</div>

<script>

let allData=[];
let chart=null;
let currentRange='24h';

const offsetInput=document.getElementById('offset');

const savedOffset=localStorage.getItem('datumOffset');

if(savedOffset){
 offsetInput.value=savedOffset;
}

offsetInput.addEventListener('input',()=>{
 localStorage.setItem('datumOffset',offsetInput.value);
 render();
});

function getOffset(){
 return parseFloat(offsetInput.value||0);
}

function createSparkline(values){

 const chars='▁▂▃▄▅▆▇█';

 const min=Math.min(...values);
 const max=Math.max(...values);

 return values.map(v=>{

  const idx=Math.round(
   ((v-min)/(max-min||1))*7
  );

  return chars[idx];

 }).join('');
}

function trendStrength(){

 if(allData.length<24){
  return ['► Stable','grey'];
 }

 const latest=allData[allData.length-1].absolute;
 const old=allData[Math.max(0,allData.length-24)].absolute;

 const change=latest-old;

 if(change>0.15) return ['▲ Rising Fast','green'];
 if(change>0.03) return ['▲ Rising','green'];
 if(change<-0.15) return ['▼ Falling Fast','red'];
 if(change<-0.03) return ['▼ Falling','red'];

 return ['► Stable','grey'];
}

function setRange(r){

 currentRange=r;

 ['6','12','24','7','3'].forEach(v=>{
  const b=document.getElementById('btn'+v);
  if(b) b.classList.remove('active');
 });

 if(r==='6h') btn6.classList.add('active');
 if(r==='12h') btn12.classList.add('active');
 if(r==='24h') btn24.classList.add('active');
 if(r==='7d') btn7.classList.add('active');
 if(r==='3m') btn3.classList.add('active');

 render();
}

async function loadData(){

 try{

  const response=await fetch(
   './data/latest.json?v='+Date.now(),
   {cache:'no-store'}
  );

  const data=await response.json();

  allData=data.rows;

  render();

 }catch(err){

  console.error(err);

 }

}

function render(){

 if(allData.length<2) return;

 const offset=getOffset();

 const latest=allData[allData.length-1];

 const latestTime=new Date(latest.timestamp);

 const latestLevel=latest.absolute+offset;

 document.getElementById('currentLevel').textContent=
 latestLevel.toFixed(3)+' m';

 const trend=trendStrength();

 const trendEl=document.getElementById('trend');

 trendEl.textContent=trend[0];
 trendEl.className='trend '+trend[1];

 document.getElementById('updated').textContent=
 latest.timestamp;

 const now=new Date();

 const ageHours=
 (now-latestTime)/3600000;

 const ageEl=document.getElementById('dataAge');

 ageEl.textContent=
 ageHours.toFixed(1)+' hours';

 if(ageHours<1){
  ageEl.className='green';
 }
 else if(ageHours<6){
  ageEl.className='orange';
 }
 else{
  ageEl.className='red';
 }

 document.getElementById('syncTime').textContent=
 now.toLocaleString();

 const values24=allData
 .filter(r=>
 latestTime-new Date(r.timestamp)<=86400000
 )
 .map(r=>r.absolute+offset);

 document.getElementById('sparkline').textContent=
 createSparkline(values24.slice(-24));

 const high=Math.max(...values24);
 const low=Math.min(...values24);
 const range=high-low;
 const change=
 values24[values24.length-1]-values24[0];

 document.getElementById('high24').textContent=
 high.toFixed(3)+' m';

 document.getElementById('low24').textContent=
 low.toFixed(3)+' m';

 document.getElementById('range24').textContent=
 range.toFixed(3)+' m';

 document.getElementById('change24').textContent=
 (change>=0?'+':'')+
 change.toFixed(3)+' m';

 if(ageHours>6){

  const recent=allData.slice(-96);

  const first=recent[0];
  const last=recent[recent.length-1];

  const hrs=
  (
   new Date(last.timestamp)-
   new Date(first.timestamp)
  )/3600000;

  const slope=
  (last.absolute-first.absolute)/hrs;

  const forecast=
  last.absolute+(slope*ageHours);

  document.getElementById('forecastBox').innerHTML=
  '<strong>Forecast Now:</strong> '+
  (forecast+offset).toFixed(3)+' m';

 }else{

  document.getElementById('forecastBox').innerHTML='';

 }

 let hours=99999;

 if(currentRange==='6h') hours=6;
 if(currentRange==='12h') hours=12;
 if(currentRange==='24h') hours=24;
 if(currentRange==='7d') hours=168;

 let filtered=allData;

 if(currentRange!=='3m'){

  filtered=allData.filter(r=>
   latestTime-new Date(r.timestamp)<=hours*3600000
  );

 }

 const labels=filtered.map(r=>{
  const d=new Date(r.timestamp);

  if(currentRange==='7d'){
   return d.toLocaleDateString(undefined,{weekday:'short'});
  }

  if(currentRange==='3m'){
   return d.toLocaleDateString(undefined,{month:'short'});
  }

  return d.toLocaleTimeString([],{
   hour:'2-digit',
   minute:'2-digit'
  });
 });

 const values=
 filtered.map(r=>r.absolute+offset);

 if(chart){
  chart.destroy();
 }

 chart=new Chart(
 document.getElementById('chart'),
 {
  type:'line',
  data:{
   labels,
   datasets:[
   {
    label:'Water Level (m)',
    data:values,
    pointRadius:(ctx)=>
      ctx.dataIndex===values.length-1?5:0,
    tension:0.2
   }]
  },
  options:{
   responsive:true,
   maintainAspectRatio:false,
   plugins:{
    legend:{display:true}
   },
   scales:{
    x:{display:true}
   }
  }
 });

}

loadData();

setRange('24h');

setInterval(loadData,900000);

</script>

</body>
</html>
