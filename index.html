<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangor Water Level</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    text-align: center;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.level {
    font-size: 4rem;
    font-weight: bold;
}

.trend {
    font-size: 1.5rem;
    font-weight: bold;
    margin-top: 10px;
}

.green { color: green; }
.red { color: red; }
.grey { color: grey; }

.stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.stat {
    flex: 1;
    min-width: 150px;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 8px;
}

button:hover {
    opacity: 0.9;
}

.active {
    font-weight: bold;
}

input {
    padding: 8px;
    font-size: 1rem;
    width: 120px;
}

canvas {
    max-height: 450px;
}
</style>
</head>
<body>

<h1>Bangor Water Level</h1>

<div class="card">
    <div id="currentLevel" class="level">Loading...</div>
    <div id="trend" class="trend"></div>
    <div id="updated"></div>
</div>

<div class="card">
    <label><strong>Datum Offset (m):</strong></label>
    <input id="offset" type="number" step="0.001" value="0">
</div>

<div class="card stats">
    <div class="stat">
        <strong>24h High</strong><br>
        <span id="high24">--</span>
    </div>

    <div class="stat">
        <strong>24h Low</strong><br>
        <span id="low24">--</span>
    </div>

    <div class="stat">
        <strong>24h Change</strong><br>
        <span id="change24">--</span>
    </div>
</div>

<div class="card">

    <button onclick="setRange('24h')" id="btn24">24 Hours</button>
    <button onclick="setRange('7d')" id="btn7">7 Days</button>
    <button onclick="setRange('3m')" id="btn3">3 Months</button>

    <br><br>

    <canvas id="chart"></canvas>
</div>

<script>

let allData = [];
let chart = null;
let currentRange = '24h';

const offsetInput = document.getElementById('offset');

const savedOffset = localStorage.getItem('datumOffset');

if(savedOffset){
    offsetInput.value = savedOffset;
}

offsetInput.addEventListener('input', () => {
    localStorage.setItem('datumOffset', offsetInput.value);
    render();
});

function getOffset(){
    return parseFloat(offsetInput.value || 0);
}

function setRange(range){
    currentRange = range;

    document.getElementById('btn24').classList.remove('active');
    document.getElementById('btn7').classList.remove('active');
    document.getElementById('btn3').classList.remove('active');

    if(range === '24h') document.getElementById('btn24').classList.add('active');
    if(range === '7d') document.getElementById('btn7').classList.add('active');
    if(range === '3m') document.getElementById('btn3').classList.add('active');

    render();
}

async function loadData(){

    try {

        const response = await fetch(
  './data/latest.json?v=' + Date.now(),
  {
    cache: 'no-store'
  }
);

        const data = await response.json();

        console.log("Rows loaded:", data.rows.length);

        allData = data.rows;

        if(allData.length === 0){
            document.getElementById('currentLevel').textContent = 'No Data';
            return;
        }

        render();

    } catch(err){

        console.error(err);

        document.getElementById('currentLevel').textContent = 'Load Error';
    }
}

function render(){

    if(allData.length < 2) return;

    const offset = getOffset();

    const latest = allData[allData.length - 1];
    const previous = allData[allData.length - 2];

    const latestLevel = latest.absolute + offset;
    const previousLevel = previous.absolute + offset;

    document.getElementById('currentLevel').textContent =
        latestLevel.toFixed(3) + ' m';

    let trendText = '';
    let trendClass = '';

    const diff = latest.absolute - previous.absolute;

    if(diff > 0.001){
        trendText = '▲ Rising';
        trendClass = 'green';
    }
    else if(diff < -0.001){
        trendText = '▼ Falling';
        trendClass = 'red';
    }
    else{
        trendText = '► Stable';
        trendClass = 'grey';
    }

    const trendEl = document.getElementById('trend');
    trendEl.className = 'trend ' + trendClass;
    trendEl.textContent = trendText;

    document.getElementById('updated').textContent =
        'Updated: ' + latest.timestamp;

    const latestTime = new Date(latest.timestamp);

    let filtered = allData;

    if(currentRange === '24h'){
        filtered = allData.filter(r =>
            latestTime - new Date(r.timestamp) <= 24 * 60 * 60 * 1000
        );
    }

    if(currentRange === '7d'){
        filtered = allData.filter(r =>
            latestTime - new Date(r.timestamp) <= 7 * 24 * 60 * 60 * 1000
        );
    }

    const values24 = allData
        .filter(r =>
            latestTime - new Date(r.timestamp) <= 24 * 60 * 60 * 1000
        )
        .map(r => r.absolute + offset);

    const high24 = Math.max(...values24);
    const low24 = Math.min(...values24);
    const change24 = values24[values24.length - 1] - values24[0];

    document.getElementById('high24').textContent =
        high24.toFixed(3) + ' m';

    document.getElementById('low24').textContent =
        low24.toFixed(3) + ' m';

    document.getElementById('change24').textContent =
        (change24 >= 0 ? '+' : '') + change24.toFixed(3) + ' m';

    const labels = filtered.map(r => r.timestamp);

    const values = filtered.map(r => r.absolute + offset);

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById('chart'),
        {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Water Level (m)',
                    data: values,
                    pointRadius: 0,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        display: false
                    }
                }
            }
        }
    );
}

loadData();

setRange('24h');

setInterval(loadData, 900000);

</script>

</body>
</html>
